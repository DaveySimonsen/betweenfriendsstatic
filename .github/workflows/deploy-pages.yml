name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path _site | Out-Null
          $siteFiles = @(
            "index.html",
            "app.js",
            "site.css",
            "title.png",
            "favicon.ico",
            "favicon-64.png",
            "favicon.svg",
            "instagram-preview.png",
            "CNAME"
          )
          Copy-Item $siteFiles -Destination _site

      - name: Stamp build commit into HTML
        shell: pwsh
        run: |
          $fullSha = "${{ github.sha }}"
          $shortSha = $fullSha.Substring(0, 7)
          $content = Get-Content _site/index.html -Raw
          $content = $content.Replace("__BUILD_COMMIT__", $fullSha)
          $content = $content.Replace("__BUILD_COMMIT_SHORT__", $shortSha)
          Set-Content -Path _site/index.html -Value $content -NoNewline

          $stampedContent = Get-Content _site/index.html -Raw
          if ($stampedContent.Contains("__BUILD_COMMIT__") -or $stampedContent.Contains("__BUILD_COMMIT_SHORT__")) {
            throw "Build commit placeholders were not fully replaced in _site/index.html"
          }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
